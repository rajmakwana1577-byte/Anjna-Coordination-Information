<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Executive Access :: Anjana</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07111f;color:#8efcff;font-family:Arial,sans-serif;overflow:hidden}
canvas{position:fixed;inset:0}
.panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
width:min(92%,470px);padding:28px;border-radius:18px;
background:rgba(10,20,35,.75);backdrop-filter:blur(10px);
border:1px solid #3ef;box-shadow:0 0 30px #1cf;text-align:center}
h1{letter-spacing:3px}
.term{margin-top:18px;background:#000;color:#7cff9e;padding:12px;
height:250px;border-radius:10px;font-family:monospace;text-align:left;
white-space:pre-wrap;overflow:auto}
button{margin-top:18px;width:100%;padding:14px;border:none;border-radius:10px;
background:#2de2ff;font-weight:bold;cursor:pointer}
.small{opacity:.7;font-size:12px;margin-top:15px}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="panel" id="panel">
<h1>KRISHNA VITRIFIED</h1>
<div style="margin-top:6px">SECURE EXECUTIVE NETWORK</div>
<div class="term" id="t"></div>
<button onclick="unlock()">OPEN CONFIDENTIAL FILE</button>
<div class="small">Client Coordination & Information Executive</div>
</div>
<script>
const c=document.getElementById("bg"),x=c.getContext("2d");
function r(){c.width=innerWidth;c.height=innerHeight}
r();onresize=r;
const pts=[...Array(70)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,v:0.3+Math.random()}));
setInterval(()=>{
x.fillStyle="#07111f";x.fillRect(0,0,c.width,c.height);
x.fillStyle="#29dfff";
pts.forEach(p=>{p.y+=p.v;if(p.y>innerHeight)p.y=0;x.beginPath();x.arc(p.x,p.y,1.5,0,6.28);x.fill();});
},30);

const lines=[
"> Initializing Executive Portal...",
"> Department Verified",
"> Client Coordination & Information Executive",
"> Employee : ANJANA",
"> Executive ID : KVT-CCE-001",
"> Trust Score : 100%",
"> Access Level : EXECUTIVE",
"> Confidential File Detected..."
];
let i=0,j=0;
const t=document.getElementById("t");
function type(){
 if(i>=lines.length)return;
 if(j<lines[i].length){t.textContent+=lines[i][j++];setTimeout(type,30);}
 else{t.textContent+="\n";i++;j=0;setTimeout(type,220);}
}
type();

function unlock(){
document.getElementById("panel").innerHTML=`
<h1>CONFIDENTIAL FILE OPENED</h1>
<div style="font-size:56px;margin:10px 0;">🔐</div>
<div style="text-align:left;line-height:1.8;font-size:18px">
<b>To: ANJANA</b><br><br>
Every client receives information.<br>
Every project receives attention.<br>
Every meeting receives preparation.<br><br>
But there is one Executive who always receives my first smile.<br><br>
Your professionalism inspires trust.<br>
Your presence brings calm.<br>
Your dedication makes every day better.<br><br>
<b>Status:</b> Executive Access Granted<br>
<b>Connection:</b> Permanent Respect & Endless Admiration.
</div>
<div style="margin-top:20px;color:#7cff9e">
KRISHNA VITRIFIED • PRIVATE EXECUTIVE MESSAGE
</div>`;
}
</script>
</body>
</html>
