<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Executive AI Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#040b16;color:#7ffcff;font-family:Segoe UI,Arial,sans-serif;overflow:hidden}
canvas{position:fixed;inset:0}
#wrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
width:min(92%,480px);padding:28px;border-radius:20px;
background:rgba(8,18,35,.82);backdrop-filter:blur(10px);
border:1px solid #39dfff;box-shadow:0 0 35px #18d9ff}
h1{text-align:center;letter-spacing:2px}
.sub{text-align:center;opacity:.8;margin:6px 0 18px}
#log{background:#000;color:#7cff92;border-radius:10px;height:260px;padding:12px;
font-family:Consolas,monospace;white-space:pre-wrap;overflow:auto}
button{margin-top:18px;width:100%;padding:14px;border:none;border-radius:10px;
font-size:16px;font-weight:bold;background:#27e5ff;cursor:pointer}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="wrap">
<h1>KRISHNA VITRIFIED</h1>
<div class="sub">AI EXECUTIVE PORTAL</div>
<div id="log"></div>
<button onclick="reveal()">AUTHORIZE ACCESS</button>
</div>
<script>
const cv=document.getElementById("bg"),ctx=cv.getContext("2d");
function size(){cv.width=innerWidth;cv.height=innerHeight}
size();addEventListener("resize",size);
let stars=[...Array(120)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,s:Math.random()*2+1}));
function anim(){
ctx.fillStyle="#040b16";ctx.fillRect(0,0,cv.width,cv.height);
ctx.fillStyle="#22dfff";
stars.forEach(a=>{a.y+=a.s;if(a.y>innerHeight)a.y=0;ctx.fillRect(a.x,a.y,2,2);});
requestAnimationFrame(anim)}
anim();

const lines=[
"> Booting Executive System...",
"> Connecting to Krishna Vitrified...",
"> Employee Found",
"> Name : ANJANA",
"> Role : Client Coordination & Information Executive",
"> Executive Rank : VERIFIED",
"> Trust Index : 100%",
"> Hidden Executive Note Detected..."
];
let i=0,j=0;
const log=document.getElementById("log");
(function type(){
 if(i>=lines.length)return;
 if(j<lines[i].length){log.textContent+=lines[i][j++];setTimeout(type,28);}
 else{log.textContent+="\n";i++;j=0;setTimeout(type,180);}
})();
function reveal(){
document.getElementById("wrap").innerHTML=`
<h1>CONFIDENTIAL MESSAGE</h1>
<div style="font-size:62px;text-align:center;margin:12px 0">🔐</div>
<div style="line-height:1.8;font-size:18px">
<b>To: Anjana</b><br><br>
Every client receives your attention.<br>
Every question receives your patience.<br>
Every task receives your professionalism.<br><br>
Among countless conversations, your presence always stands out.<br><br>
Your confidence, kindness and dedication make every working day brighter.<br><br>
<b>System Status</b><br>
Executive : Verified ✅<br>
Respect : Unlimited ∞<br>
Connection : Secure<br><br>
<i>This confidential page was generated only for Anjana.</i>
</div>
<div style="margin-top:18px;text-align:center;color:#7cff92">
KRISHNA VITRIFIED • PRIVATE EXECUTIVE CHANNEL
</div>`;
}
</script>
</body>
</html>
